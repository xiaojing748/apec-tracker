name: Update APEC News

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/main.py

      - name: Build HTML
        run: python build_html.py

      - name: Commit and push
        run: |
          mkdir -p web/data docs/data
          cp data/articles.json web/data/articles.json
          cp data/articles.json docs/data/articles.json
          cp index.html docs/index.html
          TOTAL=$(python -c "import json;d=json.load(open('data/articles.json'));print(d['total_articles'])")
          git config user.name "APEC Bot"
          git config user.email "bot@apec-tracker.local"
          git add data/articles.json web/data/articles.json docs/ index.html "APEC动态看板.html"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update: $(date +'%Y-%m-%d') [${TOTAL} articles]"
            git push
          fi
