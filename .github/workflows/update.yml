name: Update APEC News

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/main.py

      - name: Build static pages
        run: python build_html.py

      - name: Commit and push
        id: commit
        run: |
          mkdir -p web/data docs/data docs/archive
          cp data/articles.json web/data/articles.json
          cp data/articles.json docs/data/articles.json
          cp index.html docs/index.html
          cp archive.html docs/archive.html
          cp -r archive docs/ 2>/dev/null || true
          TOTAL=$(python -c "import json;d=json.load(open('data/articles.json'));print(d['total_articles'])")
          TODAY=$(python -c "import json;d=json.load(open('data/articles.json'));print(d.get('today_count',0))")
          ARCHIVE=$(python -c "import json;d=json.load(open('archive/index.json'));print(d.get('total',0))" 2>/dev/null || echo "0")
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          git config user.name "APEC Bot"
          git config user.email "bot@apec-tracker.local"
          git add data/articles.json web/data/articles.json docs/ index.html "APEC动态看板.html" archive.html archive/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update: $(date +'%Y-%m-%d') [${TOTAL} articles / ${ARCHIVE} archived]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Send Daily Digest via Pushplus
        if: always()
        run: |
          TOTAL="${{ steps.commit.outputs.total }}"
          TODAY="${{ steps.commit.outputs.today }}"
          CHANGED="${{ steps.commit.outputs.changed }}"
          DATE_STR=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')

          python -c "
          import json
          with open('data/articles.json','r',encoding='utf-8') as f:
              d = json.load(f)
          articles = sorted(d.get('articles',[]), key=lambda x: x.get('date',''), reverse=True)
          today_articles = [a for a in articles if a.get('date','')[:10] == '$(TZ=Asia/Shanghai date +%Y-%m-%d)']
          recent = today_articles[:8] if today_articles else articles[:8]
          snippets = []
          for a in recent:
              cats = ','.join(a.get('categories',['其他']))
              rel = a.get('relevance',50)
              star = '⭐' if rel>=80 else '🔶' if rel>=60 else '📄'
              title = (a.get('title','')[:60] + '...') if len(a.get('title',''))>60 else a.get('title','')
              snippets.append(f'{star} [{cats}] {title}')
          summary = '\n'.join(snippets)
          print(summary)
          " > /tmp/digest.txt

          DIGEST=$(cat /tmp/digest.txt | head -20)

          if [ "${CHANGED}" = "true" ]; then
            TITLE="APEC追踪日报 ${DATE_STR} | +${TODAY}篇 累计${TOTAL}篇"
            CONTENT="${DIGEST}<br><br>📊 <a href='https://xiaojing748.github.io/apec-tracker/'>查看完整看板</a> | 📁 <a href='https://xiaojing748.github.io/apec-tracker/archive.html'>资料库</a>"
          else
            TITLE="APEC追踪 ${DATE_STR} | 今日无更新 累计${TOTAL}篇"
            CONTENT="今日暂无新增内容。<br><br>📊 <a href='https://xiaojing748.github.io/apec-tracker/'>查看完整看板</a>"
          fi

          curl -s -X POST http://www.pushplus.plus/send \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${{ secrets.PUSHPLUS_TOKEN }}\",\"title\":\"${TITLE}\",\"content\":\"${CONTENT}\"}"
