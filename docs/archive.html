        d + ' <span class="count">' + dates[d] + '篇</span></button>';
    });

    var list = document.getElementById('dateList');
    list.innerHTML = html;

    var buttons = list.querySelectorAll('.date-item');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].onclick = function () {
        var active = list.querySelector('.active');
        if (active) active.classList.remove('active');
        this.classList.add('active');
        selectedDate = this.getAttribute('data-date');
        renderContent();
      };
    }
  }

  function bindSearch() {
    document.getElementById('searchBox').oninput = function () {
      searchQuery = this.value.trim().toLowerCase();
      renderContent();
    };
  }

  function renderContent() {
    var content = document.getElementById('content');
    var filtered = entries.slice();

    if (selectedDate) {
      filtered = filtered.filter(function (e) { return e.date === selectedDate; });
    }
    if (searchQuery) {
      filtered = filtered.filter(function (e) {
        return (e.title || '').toLowerCase().indexOf(searchQuery) !== -1 ||
          (e.source || '').toLowerCase().indexOf(searchQuery) !== -1;
      });
    }

    if (!selectedDate && !searchQuery) {
      content.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>从左侧选择日期或搜索文章标题</p></div>';
      return;
    }

    if (!filtered.length) {
      content.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>无匹配结果</p></div>';
      return;
    }

    var html = '';
    filtered.forEach(function (e, idx) {
      var cats = (e.categories || ['其他']).map(function (c) {
        return '<span class="tag tag-' + c + '">' + esc(c) + '</span>';
      }).join('');

      html += '<div class="article-detail" id="art-' + idx + '">' +
        '<h2>' + esc(e.title) + '</h2>' +
        '<div class="article-meta">' +
        '<span>📅 ' + (e.date || '-') + '</span>' +
        '<span>📰 ' + esc(e.source || '-') + '</span>' +
        (e.url ? '<span>🔗 <a href="' + esc(e.url) + '" target="_blank" rel="noopener">查看原文</a></span>' : '') +
        '</div>' +
        '<div class="tags">' + cats + '</div>';

      if (e.file) {
        html += '<div class="fulltext" id="text-' + idx + '">加载中...</div>';
      } else {
        html += '<div class="no-content">📝 存档文件尚未生成，请运行 archiver</div>';
      }

      html += '</div>';
    });

    content.innerHTML = html;

    // 异步加载全文
    filtered.forEach(function (e, idx) {
      if (e.file) {
        loadFullText(e.file, 'text-' + idx);
      }
    });
  }

  function loadFullText(path, elemId) {
    var el = document.getElementById(elemId);
    if (!el) return;

    // 尝试多种路径：适配根目录部署和docs/部署
    var alt = path.replace(/^docs\//, 'archive/');
    var paths = [path, alt];
    tryPath(0);

    function tryPath(idx) {
      if (idx >= paths.length) {
        el.innerHTML = '<div class="no-content">📝 全文文件未找到，请<a href="#" onclick="return false;">查看原文链接</a></div>';
        return;
      }
      var xhr = new XMLHttpRequest();
      xhr.open('GET', paths[idx], true);
      xhr.onload = function () {
        if (xhr.status === 200) {
          el.innerHTML = renderMarkdown(xhr.responseText);
        } else {
          tryPath(idx + 1);
        }
      };
      xhr.onerror = function () { tryPath(idx + 1); };
      xhr.send();
    }
  }

  function renderMarkdown(md) {
    // 移除 frontmatter
    md = md.replace(/^---[\s\S]*?---\n*/, '');
    // 转义HTML
    md = esc(md);
    // 标题
    md = md.replace(/^# (.+)$/gm, '<h2>$1</h2>');
    md = md.replace(/^## (.+)$/gm, '<h3>$1</h3>');
    // 粗体
    md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // 链接
    md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // 段落
    return '<p>' + md.split(/\n\n+/).join('</p><p>') + '</p>';
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
